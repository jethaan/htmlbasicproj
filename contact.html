<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial scale=1.0">
        <title>Contact</title>
    </head>
    <body>
        <form>
            <label for="fname">Full name:</label><br>
            <input type="text" id="fname" name="fname" placeholder="eg: Juan Dela Cruz"><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="eg: juandelacruz@gmail.com">
            <br>
            <br>
            <input type="submit" value="Submit">
            <br>
            <br>
            <label for="message">Your Message:</label><br>
            <textarea name="message" id="message" style="height:20" placeholder="Enter Text Here"></textarea>  </textarea>
        </form>
    </body>
</html>
